---
layout: page
---
<article class="prose">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.author %} · {{ page.author }}{% endif %}
    </p>
  </header>

  {{ content }}

  <a class="back-link" href="/blog">&larr; all posts</a>
</article>
