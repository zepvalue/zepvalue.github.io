# this is only for search engines, it does not appear in the home
# as long as the json variables name and description are provided
title: Giuseppe Zep V
description: Software Engineer
baseurl: ""
url: https://zepvalue.github.io

# ── Profile shown on the homepage ───────────────────────────────────────────
json:
  name: Giuseppe Zep V
  # avatar shown in the center column (GitHub serves your avatar at /<user>.png)
  avatar: https://github.com/zepvalue.png
  # the bio is "typed" out under your name; add more lines for a rotating effect
  description:
    - Backend Engineer
    - Distributed systems · gRPC · Node
  github_user: zepvalue
  # live local time is shown using this IANA timezone
  timezone: Europe/Rome
  contact:
    email: zepvalue@gmail.com
  profiles:
    linkedin: https://www.linkedin.com/in/zepvalue
    github: https://github.com/zepvalue
    x: https://x.com/zepvalue
    apps: "/apps"

# ── Center-column link rows (icon + label + arrow) ──────────────────────────
# icon must match an SVG name in _includes/icon.html (github, linkedin, x,
# email, blog, apps). external links open in a new tab automatically.
links:
  - label: GitHub
    icon: github
    url: https://github.com/zepvalue
  - label: LinkedIn
    icon: linkedin
    url: https://www.linkedin.com/in/zepvalue
  - label: X
    icon: x
    url: https://x.com/zepvalue
  - label: Email
    icon: email
    url: mailto:zepvalue@gmail.com
  - label: Apps
    icon: apps
    url: /apps/

# ── Left sidebar: pinned repositories (newest/most relevant first) ──────────
# leave empty to let the GitHub card auto-fill from your public repos.
pinned:
  - name: firecomm
    description: Feature library for gRPC-Node.
    language: JavaScript
    color: "#f1e05a"
  - name: zippy-fit
    description: "A co-op fitness game: keep a shared streak going."
    language: TypeScript
    color: "#3178c6"

exclude:
  - LICENSE
  - README.md
  - Makefile
  - Gemfile
  - Gemfile.lock

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

whitelist:
  - jekyll-sitemap

sass:
  sass_dir: _sass
  style: compressed
  sourcemap: never
