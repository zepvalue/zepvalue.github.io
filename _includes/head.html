<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{% if page.title and page.url != "/" %}{{ page.title }} · {{ site.json.name | default: site.title }}{% else %}{{ site.json.name | default: site.title }}{% if site.json.description %} — {{ site.json.description | first }}{% endif %}{% endif %}</title>

  {% seo title=false %}

  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
  <link rel="manifest" href="/assets/site.webmanifest">

  <meta name="theme-color" content="#09090b" />
  <meta name="color-scheme" content="dark" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" />

  <link rel="stylesheet" href="/assets/css/normalize.min.css" />
  <link rel="stylesheet" href="/assets/css/open-color.min.css" />
  <link rel="stylesheet" href="/assets/css/styles.min.css" />

  <script src="/assets/js/typed.min.js"></script>
</head>
